name: Docs

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build the site (strict catches broken references)
        run: mkdocs build --strict
      - name: Upload the built site
        if: github.ref == 'refs/heads/main' && vars.DEPLOY_DOCS == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Publishing to Pages is opt-in, so it never fails CI before you are ready. The strict build above
  # is the required gate. To publish the site, do two one-time steps: enable Pages under Settings,
  # Pages, Build and deployment, Source: GitHub Actions; then set a repository variable DEPLOY_DOCS to
  # true under Settings, Secrets and variables, Actions, Variables. Until then this job is skipped.
  deploy:
    name: deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_DOCS == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
