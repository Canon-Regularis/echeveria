name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build, publish to PyPI, and cut a
# GitHub Release. PyPI upload uses trusted publishing (OIDC); configure the trusted publisher on PyPI
# for this repository, or swap in a token, before the first release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # PyPI trusted publishing

jobs:
  release:
    name: build, publish, and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify the tag matches the package version
        run: |
          python - <<'PY'
          import os, tomllib
          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          assert version == tag, f"tag {tag} does not match version {version}"
          print("ok: tag matches version", version)
          PY
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
